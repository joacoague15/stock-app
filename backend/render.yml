services:
  - type: web
    name: stock-alerts-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stock-alerts-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FINNHUB_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false

databases:
  - name: stock-alerts-db
    plan: free
    region: oregon